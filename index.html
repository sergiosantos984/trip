<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waze Clone - Universal Responsive Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: system-ui, sans-serif; background-color: #f3f4f6; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .hud { z-index: 10; }
        .leaflet-routing-container { display: none !important; }

        .search-results-box {
            position: absolute; top: 46px; left: 0; right: 0;
            background: white; border-radius: 12px; max-height: 150px;
            overflow-y: auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 100; border: 1px solid #e5e7eb; display: none;
        }
        .search-item { padding: 10px 14px; font-size: 13px; color: #4b5563; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
        .search-item:hover { background-color: #f3f4f6; color: #1f2937; }

        /* Smooth 3D Driving Horizon Map Transforms */
        .driving-mode #map {
            transform: rotateX(26deg) scale(1.3);
            transform-origin: center center;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .driving-perspective { perspective: 500px; width: 100%; height: 100%; position: absolute; overflow: hidden; }
        .chevron-icon-wrapper { transition: transform 0.15s ease-out; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="overflow-hidden select-none text-gray-900">

    <div id="map-frame" class="driving-perspective">
        <div id="map"></div>
    </div>

    <div id="top-turn-banner" class="hud hidden absolute top-0 left-0 right-0 bg-[#0c0f14]/95 backdrop-blur-md p-3 sm:p-4 flex items-center space-x-4 transition-all duration-300">
        <div class="text-2xl sm:text-3xl font-bold text-white pl-2">↰</div>
        <div>
            <p class="text-base sm:text-lg font-bold text-white" id="nav-distance-text">0.4 miles</p>
            <p class="text-[11px] sm:text-xs text-cyan-400 font-semibold" id="nav-road-text">Main St</p>
        </div>
    </div>

    <div id="fact-card" class="hud fixed top-16 sm:top-24 left-4 right-4 sm:right-auto sm:w-72 bg-white/95 backdrop-blur-md border border-gray-100 rounded-2xl p-4 shadow-2xl transform -translate-y-96 sm:-translate-y-0 sm:-translate-x-[340px] transition-transform duration-500 ease-out">
        <div class="flex items-center space-x-2 mb-1.5">
            <span class="text-lg">💡</span>
            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Passing Nearby</span>
        </div>
        <h4 id="fact-title" class="text-xs sm:text-sm font-black text-gray-900 mb-0.5">Local History Drop</h4>
        <p id="fact-body" class="text-[11px] sm:text-xs text-gray-600 leading-relaxed">Keep driving to discover fascinating local secrets and context about your surroundings!</p>
        <div class="w-full bg-gray-100 h-1 rounded-full mt-2.5 overflow-hidden">
            <div id="fact-progress" class="bg-blue-500 h-full w-0 transition-all duration-1000 linear"></div>
        </div>
    </div>

    <div id="side-actions-panel" class="hud hidden absolute right-3 sm:right-4 top-20 sm:top-24 flex flex-col space-y-2.5">
        <button onclick="adjustJourneyZoom(1)" class="w-10 h-10 sm:w-11 sm:h-11 bg-white hover:bg-gray-100 active:scale-95 text-gray-800 rounded-xl shadow-md flex items-center justify-center text-lg sm:text-xl font-black border border-gray-200 transition">+</button>
        <button onclick="adjustJourneyZoom(-1)" class="w-10 h-10 sm:w-11 sm:h-11 bg-white hover:bg-gray-100 active:scale-95 text-gray-800 rounded-xl shadow-md flex items-center justify-center text-lg sm:text-xl font-black border border-gray-200 transition">-</button>
        <div class="w-full h-px bg-gray-200 my-0.5"></div>
        <button class="w-10 h-10 sm:w-11 sm:h-11 bg-white hover:bg-gray-100 text-gray-700 rounded-full shadow-lg flex items-center justify-center text-base sm:text-lg border border-gray-100">🎙️</button>
        <button class="w-10 h-10 sm:w-11 sm:h-11 bg-pink-500 hover:bg-pink-600 text-white rounded-full shadow-lg flex items-center justify-center text-base sm:text-lg">🎵</button>
        <button id="report-trigger-btn" class="w-11 h-11 sm:w-12 sm:h-12 bg-amber-500 hover:bg-amber-600 active:scale-95 text-white rounded-full shadow-xl flex items-center justify-center text-lg sm:text-xl font-bold border-2 border-white transition-all animate-pulse">⚠️</button>
    </div>

    <div class="hud absolute bottom-52 sm:bottom-44 left-1/2 -translate-x-1/2 flex justify-center w-max pointer-events-none">
        <button id="recenter-btn" onclick="recenterMapOnUserVehicle()" class="pointer-events-auto opacity-0 scale-90 translate-y-4 transition-all duration-300 ease-out bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 sm:px-5 sm:py-2.5 rounded-full shadow-2xl flex items-center space-x-2 border border-blue-400 text-[10px] sm:text-xs uppercase tracking-wider">
            <span>🎯</span>
            <span>Recenter</span>
        </button>
    </div>

    <div id="report-modal" class="hud hidden absolute inset-0 bg-black/50 backdrop-blur-xs flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-sm p-6 shadow-2xl border-t sm:border border-gray-100 transform translate-y-full sm:translate-y-0 sm:scale-95 transition-all duration-300">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-base sm:text-lg font-black text-gray-900 tracking-tight">Report Map Hazard</h3>
                <button onclick="toggleReportModal(false)" class="text-gray-400 hover:text-gray-600 text-xs font-bold bg-gray-100 w-7 h-7 rounded-full flex items-center justify-center">✕</button>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-4 sm:mb-6">
                <button onclick="submitIncident('Crash', '💥')" class="flex flex-col items-center justify-center p-3.5 sm:p-4 bg-red-50 hover:bg-red-100 border border-red-100 rounded-2xl group transition">
                    <span class="text-2xl sm:text-3xl mb-1.5 group-hover:scale-110 transition">💥</span>
                    <span class="text-[11px] sm:text-xs font-bold text-red-700">Crash</span>
                </button>
                <button onclick="submitIncident('Police', '👮')" class="flex flex-col items-center justify-center p-3.5 sm:p-4 bg-blue-50 hover:bg-blue-100 border border-blue-100 rounded-2xl group transition">
                    <span class="text-2xl sm:text-3xl mb-1.5 group-hover:scale-110 transition">👮</span>
                    <span class="text-[11px] sm:text-xs font-bold text-blue-700">Police</span>
                </button>
                <button onclick="submitIncident('Traffic', '🚧')" class="flex flex-col items-center justify-center p-3.5 sm:p-4 bg-amber-50 hover:bg-amber-100 border border-amber-100 rounded-2xl group transition">
                    <span class="text-2xl sm:text-3xl mb-1.5 group-hover:scale-110 transition">🚧</span>
                    <span class="text-[11px] sm:text-xs font-bold text-amber-700">Hazard</span>
                </button>
            </div>
        </div>
    </div>

    <div id="nav-panel" class="hud absolute bottom-0 sm:bottom-auto top-auto sm:top-4 left-0 sm:left-4 right-0 sm:right-auto bg-white/95 backdrop-blur-md shadow-2xl rounded-t-2xl sm:rounded-2xl p-4 w-full sm:w-80 border-t sm:border border-gray-200 transition-all duration-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2.5">Where to?</h2>
        <div class="space-y-2.5">
            <div class="relative flex flex-col bg-gray-100 p-2 rounded-xl border border-transparent focus-within:border-blue-500 transition">
                <div class="flex items-center">
                    <span class="text-sm mr-2">🔵</span>
                    <input id="start-search" type="text" placeholder="Search starting point..." class="bg-transparent text-xs sm:text-sm w-full outline-none text-gray-700 placeholder-gray-400">
                </div>
                <div id="start-results" class="search-results-box"></div>
            </div>
            <div class="relative flex flex-col bg-gray-100 p-2 rounded-xl border border-transparent focus-within:border-cyan-500 transition">
                <div class="flex items-center">
                    <span class="text-sm mr-2">📍</span>
                    <input id="dest-search" type="text" placeholder="Search destination..." class="bg-transparent text-xs sm:text-sm w-full outline-none text-gray-700 placeholder-gray-400">
                </div>
                <div id="dest-results" class="search-results-box"></div>
            </div>
        </div>
        
        <div id="trip-metrics" class="hidden mt-3 pt-3 border-t border-gray-200">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <p class="text-[10px] text-gray-400 font-medium uppercase tracking-tight">Drive Time</p>
                    <p id="eta-time" class="text-lg font-black text-blue-600">-- mins</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 font-medium uppercase tracking-tight">Distance</p>
                    <p id="eta-distance" class="text-xs sm:text-sm font-bold text-gray-600">-- km</p>
                </div>
            </div>
            <button id="start-trip-btn" class="w-full bg-blue-500 hover:bg-blue-600 active:scale-95 text-white font-bold py-2.5 sm:py-3 rounded-xl shadow-lg transition text-center tracking-wide text-xs sm:text-sm uppercase">
                Start My Trip
            </button>
        </div>
    </div>

    <div id="bottom-status-banner" class="hud hidden absolute bottom-0 left-0 right-0 bg-white shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.1)] rounded-t-3xl p-4 sm:p-5 border-t border-gray-100 transition-all duration-300">
        <div class="max-w-md mx-auto flex flex-col items-center">
            <div class="flex justify-center items-baseline space-x-2.5 text-gray-900 mb-3 sm:mb-4">
                <span id="bottom-eta-time" class="text-xl sm:text-2xl font-black">44 min</span>
                <span class="text-gray-300 text-base sm:text-lg">•</span>
                <span id="bottom-eta-arrival" class="text-gray-700 font-bold text-base sm:text-lg">11:24</span>
                <span class="text-gray-300 text-base sm:text-lg">•</span>
                <span id="bottom-eta-dist" class="text-gray-500 font-medium text-sm sm:text-base">24 mi</span>
            </div>
            <div class="w-full bg-gray-50 rounded-xl p-2.5 flex flex-col items-center border border-gray-100">
                <div class="flex items-center space-x-2 text-xs sm:text-sm font-bold text-gray-800">
                    <span id="alert-icon-field">🔔</span>
                    <span id="alert-message-field">Live feed reporting connected</span>
                </div>
            </div>
            <button onclick="endTripNavigation()" class="mt-2.5 text-[10px] sm:text-xs text-gray-400 hover:text-gray-600 uppercase tracking-wider font-semibold">End Route</button>
        </div>
    </div>

    <div class="hud absolute bottom-28 sm:bottom-32 left-4 sm:left-6 bg-slate-900/85 backdrop-blur-md w-14 h-14 sm:w-16 sm:h-16 rounded-full flex flex-col items-center justify-center shadow-xl border border-slate-800">
        <span class="text-lg sm:text-xl font-black text-white leading-none" id="speedo">0</span>
        <span class="text-[8px] sm:text-[9px] text-gray-400 font-bold tracking-tighter mt-0.5">MPH</span>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([38.7223, -9.1393], 13); 
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        let userLocation = L.latLng([38.7223, -9.1393]); 
        let startPoint = null, endPoint = null, routingControl = null, carMarker = null;
        let isDrivingModeActive = false;
        let isCameraUserDetached = false; 
        let currentJourneyZoom = 18; 
        let triviaInterval = null;

        const localFunFactsPool = [
            { title: "Ancient Aqueducts", body: "The massive underground stone conduits beneath this zone were designed in the 18th century to handle historic water distributions!" },
            { title: "Historic Tramways", body: "The vintage yellow iron rails crisscrossing these neighborhood routes have been handling steep climbs since 1873." },
            { title: "Traditional Tile Art", body: "Look closer at the surrounding residential buildings—many facades showcase hand-painted blue ceramic tiles from centuries past." }
        ];

        const chevronIcon = L.divIcon({
            html: `<div class="chevron-icon-wrapper" style="width:44px; height:44px;"><svg width="36" height="36" viewBox="0 0 32 32" fill="none" style="filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.2));"><path d="M16 3L27 27L16 20L5 27L16 3Z" fill="#52b7e9" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg></div>`,
            className: 'custom-navigation-chevron', iconSize: [44, 44], iconAnchor: [22, 22]
        });

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                const oldLocation = userLocation;
                userLocation = L.latLng(pos.coords.latitude, pos.coords.longitude);
                
                const speedMph = pos.coords.speed ? Math.round(pos.coords.speed * 2.23694) : 0;
                document.getElementById('speedo').innerText = speedMph;

                if (!carMarker) carMarker = L.marker(userLocation, { icon: chevronIcon }).addTo(map);
                else carMarker.setLatLng(userLocation);

                if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) { rotateChevron(pos.coords.heading); }
                else if (oldLocation && !oldLocation.equals(userLocation)) {
                    const angle = Math.atan2(userLocation.lng - oldLocation.lng, userLocation.lat - oldLocation.lat) * (180 / Math.PI);
                    rotateChevron(angle);
                }

                if (isDrivingModeActive && !isCameraUserDetached) {
                    map.setView(userLocation, currentJourneyZoom, { animate: true, duration: 0.2 });
                } else if (!startPoint) {
                    startPoint = userLocation;
                    document.getElementById('start-search').value = "My Current Location";
                    map.setView(userLocation, 15);
                }
            }, null, { enableHighAccuracy: true, maximumAge: 0 });
        }
        if (!carMarker) carMarker = L.marker(userLocation, { icon: chevronIcon }).addTo(map);

        function rotateChevron(degrees) {
            const el = carMarker?.getElement()?.querySelector('.chevron-icon-wrapper');
            if (el) el.style.transform = `rotate(${degrees}deg)`;
        }

        function adjustJourneyZoom(direction) {
            const newZoom = currentJourneyZoom + direction;
            if (newZoom >= 16 && newZoom <= 20) {
                currentJourneyZoom = newZoom;
                if (isDrivingModeActive) flagUserCameraDetached();
                map.setView(isDrivingModeActive ? map.getCenter() : userLocation, currentJourneyZoom, { animate: true, duration: 0.2 });
            }
        }

        function flagUserCameraDetached() {
            if (!isDrivingModeActive) return;
            isCameraUserDetached = true;
            const btn = document.getElementById('recenter-btn');
            btn.style.opacity = "1";
            btn.style.transform = "translateY(0) scale(1)";
            btn.style.pointerEvents = "auto";
        }

        function recenterMapOnUserVehicle() {
            isCameraUserDetached = false;
            const btn = document.getElementById('recenter-btn');
            btn.style.opacity = "0";
            btn.style.transform = "translateY(16px) scale(0.9)";
            btn.style.pointerEvents = "none";
            
            currentJourneyZoom = map.getZoom(); 
            map.setView(userLocation, currentJourneyZoom, { animate: true, duration: 0.4 });
        }

        map.on('dragstart zoomstart', () => { if (isDrivingModeActive) flagUserCameraDetached(); });

        // Responsive Fact Drawer Rotation Engine
        function startTriviaCycleEngine() {
            let index = 0;
            const factCard = document.getElementById('fact-card');
            const progress = document.getElementById('fact-progress');
            const isMobile = window.innerWidth < 640;

            function injectNextFact() {
                // Slide out based on responsive screen width layout rules
                factCard.style.transform = isMobile ? "translateY(-380px)" : "translateX(-340px)";
                
                setTimeout(() => {
                    const targetData = localFunFactsPool[index];
                    document.getElementById('fact-title').innerText = targetData.title;
                    document.getElementById('fact-body').innerText = targetData.body;
                    
                    factCard.style.transform = isMobile ? "translateY(0px)" : "translateX(0px)";
                    progress.style.width = "100%";
                    progress.style.transition = "width 7000ms linear";

                    index = (index + 1) % localFunFactsPool.length;
                }, 600);

                setTimeout(() => {
                    factCard.style.transform = isMobile ? "translateY(-380px)" : "translateX(-340px)";
                    setTimeout(() => {
                        progress.style.transition = "none";
                        progress.style.width = "0%";
                    }, 600);
                }, 7500);
            }

            setTimeout(injectNextFact, 2000);
            triviaInterval = setInterval(injectNextFact, 14000);
        }

        function stopTriviaCycleEngine() {
            clearInterval(triviaInterval);
            const isMobile = window.innerWidth < 640;
            document.getElementById('fact-card').style.transform = isMobile ? "translateY(-380px)" : "translateX(-340px)";
        }

        function toggleReportModal(show) {
            const el = document.getElementById('report-modal');
            const inner = el.querySelector('div');
            const isMobile = window.innerWidth < 640;
            if(show) {
                el.classList.remove('hidden');
                setTimeout(() => {
                    if (isMobile) inner.style.transform = "translateY(0)";
                    else inner.style.transform = "scale(1)";
                }, 10);
            } else {
                if (isMobile) inner.style.transform = "translateY(100%)";
                else inner.style.transform = "scale(0.95)";
                setTimeout(() => el.classList.add('hidden'), 300);
            }
        }

        function submitIncident(type, emoji) {
            toggleReportModal(false);
            document.getElementById('alert-icon-field').innerText = emoji;
            document.getElementById('alert-message-field').innerText = `${type} reported here`;
            
            const hazardIcon = L.divIcon({
                html: `<div class="text-3xl animate-bounce">${emoji}</div>`,
                className: 'custom-hazard-pin', iconSize: [40, 40], iconAnchor: [20, 20]
            });
            L.marker(userLocation, { icon: hazardIcon }).addTo(map);
        }

        document.getElementById('report-trigger-btn').addEventListener('click', () => toggleReportModal(true));

        // Photon Autocomplete Pipeline Initialization Hooks
        function initAutocompleteSearch(inputId, resultsBoxId, selectionCallback) {
            const inputEl = document.getElementById(inputId);
            const resultsBoxEl = document.getElementById(resultsBoxId);

            inputEl.addEventListener('input', function() {
                const query = this.value.trim();
                if (query.length < 3) { resultsBoxEl.innerHTML = ''; resultsBoxEl.style.display = 'none'; return; }

                const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=${userLocation.lat}&lon=${userLocation.lng}&limit=5`;
                fetch(url).then(res => res.json()).then(data => {
                    resultsBoxEl.innerHTML = '';
                    if (!data.features || data.features.length === 0) { resultsBoxEl.style.display = 'none'; return; }
                    resultsBoxEl.style.display = 'block';
                    data.features.forEach(feature => {
                        const props = feature.properties;
                        const name = [props.name, props.city].filter(Boolean).join(', ');
                        const coords = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);

                        const itemEl = document.createElement('div');
                        itemEl.className = 'search-item';
                        itemEl.innerText = name;
                        itemEl.addEventListener('click', () => {
                            inputEl.value = name;
                            resultsBoxEl.innerHTML = '';
                            resultsBoxEl.style.display = 'none';
                            selectionCallback(coords);
                        });
                        resultsBoxEl.appendChild(itemEl);
                    });
                });
            });
        }

        initAutocompleteSearch('start-search', 'start-results', (coords) => { startPoint = coords; calculateBestJourney(); });
        initAutocompleteSearch('dest-search', 'dest-results', (coords) => { endPoint = coords; calculateBestJourney(); });

        function calculateBestJourney() {
            if (!startPoint || !endPoint) return;
            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [startPoint, endPoint],
                routeWhileDragging: false,
                lineOptions: { styles: [{ color: '#4f46e5', opacity: 0.85, weight: 6 }] },
                createMarker: (i, wp) => i === 1 ? L.marker(wp.latLng, { icon: L.divIcon({ html: "🎯", className: 'text-xl' }) }) : null
            }).addTo(map);

            routingControl.on('routesfound', (e) => {
                const route = e.routes[0];
                const mins = Math.round(route.summary.totalTime / 60);
                const miles = (route.summary.totalDistance * 0.000621371).toFixed(1);

                document.getElementById('trip-metrics').classList.remove('hidden');
                document.getElementById('eta-time').innerText = `${mins} mins`;
                document.getElementById('eta-distance').innerText = `${(route.summary.totalDistance / 1000).toFixed(1)} km`;

                const etaDate = new Date(Date.now() + route.summary.totalTime * 1000);
                document.getElementById('bottom-eta-time').innerText = `${mins} min`;
                document.getElementById('bottom-eta-dist').innerText = `${miles} mi`;
                document.getElementById('bottom-eta-arrival').innerText = etaDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                map.fitBounds(L.latLngBounds(startPoint, endPoint), { padding: [40, 40] });
            });
        }

        document.getElementById('start-trip-btn').addEventListener('click', () => {
            if (!routingControl) return;
            isDrivingModeActive = true;
            isCameraUserDetached = false;

            const isMobile = window.innerWidth < 640;
            if (isMobile) {
                document.getElementById('nav-panel').style.transform = "translateY(100%)";
            } else {
                document.getElementById('nav-panel').classList.add('-translate-x-96', 'opacity-0');
            }

            document.getElementById('top-turn-banner').classList.remove('hidden');
            document.getElementById('side-actions-panel').classList.remove('hidden');
            document.getElementById('bottom-status-banner').classList.remove('hidden');
            document.getElementById('map-frame').classList.add('driving-mode');

            setTimeout(() => { map.invalidateSize(); }, 300);
            map.setView(userLocation, currentJourneyZoom, { animate: true, duration: 0.5 });
            
            startTriviaCycleEngine();
        });

        function endTripNavigation() {
            isDrivingModeActive = false;
            isCameraUserDetached = false;
            
            recenterMapOnUserVehicle();

            const isMobile = window.innerWidth < 640;
            if (isMobile) {
                document.getElementById('nav-panel').style.transform = "translateY(0)";
            } else {
                document.getElementById('nav-panel').classList.remove('-translate-x-96', 'opacity-0');
            }

            document.getElementById('top-turn-banner').classList.add('hidden');
            document.getElementById('side-actions-panel').classList.add('hidden');
            document.getElementById('bottom-status-banner').classList.add('hidden');
            document.getElementById('map-frame').classList.remove('driving-mode');
            
            stopTriviaCycleEngine();
            map.setView(userLocation, 14);
        }
    </script>
</body>
</html>
